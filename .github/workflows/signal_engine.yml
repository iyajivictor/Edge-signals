: EDGE Signal Engine

on:
  schedule:
    - cron: "0,20,40 8-22 * * 1-5"
  workflow_dispatch:

jobs:
  run-signal-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: state/
          key: edge-state-${{ runner.os }}
          restore-keys: edge-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run signal engine
        env:
          FCS_API_KEY: ${{ secrets.FCS_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python signal_engine.py

      - name: Save cache
        uses: actions/cache@v4
        with:
          path: state/
          key: edge-state-${{ runner.os }}

      - name: Save state to repo
        run: |
          git config --local user.email "edge-bot@github.com"
          git config --local user.name "EDGE Bot"
          git add state/ || true
          git diff --staged --quiet || git commit -m "Update state $(date -u '+%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git || true
        continue-on-error: true
