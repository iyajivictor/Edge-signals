name: EDGE Signal Engine

on:
  repository_dispatch:
    types: [trigger-signal-engine]
  workflow_dispatch:

jobs:
  run-signal-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gspread google-auth numpy

      - name: Run signal engine
        env:
          TWELVE_DATA_KEY:    ${{ secrets.TWELVE_DATA_KEY }}
          TG_TOKEN:           ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:         ${{ secrets.TG_CHAT_ID }}
          SHEET_ID:           ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python signal_engine.py

      - name: Save state to repo
        run: |
          git config --local user.email "edge-bot@github.com"
          git config --local user.name "EDGE Bot"
          git add state/ || true
          git diff --staged --quiet || git commit -m "Update state"
          git push || true
        continue-on-error: true
        
