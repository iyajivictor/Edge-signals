name: EDGE Signal Engine

on:
  schedule:
    - cron: "0,20,40 8-22 * * 1-5"
  workflow_dispatch:

jobs:
  run-signal-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run signal engine
        env:
          FCS_API_KEY: ${{ secrets.FCS_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python signal_engine.py

      - name: Save state to repo
        run: |
          git config --local user.email "edge-bot@github.com"
          git config --local user.name "EDGE Bot"
          git add state/ || true
          git diff --staged --quiet || git commit -m "Update state"
          git push || true
        continue-on-error: true
